name: Functionality test for helm chart
run-name: ${{ github.actor }} is testing out helm chart functions 🚀

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "**.py"
      - "pyproject.toml"
      - "helm/**"
  pull_request:
    paths:
      - ".github/**"
      - "**.py"
      - "pyproject.toml"
      - "helm/**"

jobs:
  e2e-k8s-functionality-test:
    name: E2E Kubernetes Functionality Test
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Create k8s Kind Cluster
        run: |
          # Define variables
          CLUSTER_NAME="production-stack"
          KIND_NODE_IMAGE="kindest/node:v1.23.17"

          echo "Kubernetes version: ${KIND_NODE_IMAGE}"

          # Install kubectl if not present
          if ! command -v kubectl &> /dev/null; then
            echo "Installing kubectl..."
            curl -LO "https://dl.k8s.io/release/v1.28.3/bin/linux/amd64/kubectl"
            sudo chmod +x kubectl
            sudo mv kubectl /usr/local/bin/kubectl
          fi

          # Install kind if not present
          if ! command -v kind &> /dev/null; then
            echo "Installing kind..."
            curl -LO https://github.com/kubernetes-sigs/kind/releases/download/v0.20.0/kind-linux-amd64
            sudo chmod +x kind-linux-amd64
            sudo mv kind-linux-amd64 /usr/local/bin/kind
            kind version
          fi

          # Delete existing cluster if it exists
          if kind get clusters | grep -q "${CLUSTER_NAME}"; then
            echo "Deleting existing cluster: ${CLUSTER_NAME}"
            kind delete cluster --name "${CLUSTER_NAME}"
          fi

          # Create new cluster
          echo "Creating new cluster: ${CLUSTER_NAME}"
          kind create cluster --name "${CLUSTER_NAME}" --image "${KIND_NODE_IMAGE}"

          # Output cluster info
          kubectl version
          kubectl get all --all-namespaces

      - name: Verify Kind cluster is ready
        run: |
          for i in {1..30}; do
            echo "Attempt ${i}/30: Checking cluster status..."
            if kubectl get nodes -o wide; then
              break
            else
              sleep 10
            fi

            if [ "${i}" -gt 10 ]; then
              echo "Cluster state details:"
              kubectl describe nodes
              kubectl get events --sort-by='.lastTimestamp' -A
              kubectl get pods -A -o wide
            fi
          done

          kubectl wait --for=condition=Ready nodes --all --timeout=600s

          printf "\n=== Cluster Details ===\n"
          kubectl config view
          kubectl cluster-info
          kubectl get nodes -o wide
          kubectl describe nodes
          kubectl get pods -A -o wide
          kubectl get events --sort-by='.lastTimestamp' -A
          helm version
          kubectl version
          printf "\n=== Final Cluster Health Check ===\n"
          kubectl get cs
          kubectl -n kube-system wait --for=condition=Ready pod --all --timeout=300s

      - name: Clean up Docker system before building image
        run: |
          echo "Cleaning up Docker system..."
          docker system prune --all --volumes --force
          # Remove dangling images specifically
          docker image prune --force

      - name: Build and Load Docker image
        env:
          DOCKER_IMAGE_NAME: localhost:5000/git-act-router
        run: |
          sudo docker build --build-arg INSTALL_OPTIONAL_DEP=default \
            --no-cache \
            -t "$DOCKER_IMAGE_NAME" \
            -f docker/Dockerfile .
          echo "✅ Docker image $DOCKER_IMAGE_NAME built successfully!"
          echo "Verifying Docker image..."
          if ! docker images "$DOCKER_IMAGE_NAME" | grep "$DOCKER_IMAGE_NAME"; then
            echo "❌ Docker image $DOCKER_IMAGE_NAME not found after build!"
            exit 1
          fi
          echo "✅ Docker image $DOCKER_IMAGE_NAME found after build!"
          sudo sysctl fs.protected_regular=0
          # Verify image integrity before loading
          echo "Verifying image digest..."
          if ! docker inspect --format='{{.Id}}' "$DOCKER_IMAGE_NAME" >/dev/null 2>&1; then
            echo "❌ Failed to verify image digest for $DOCKER_IMAGE_NAME"
            exit 1
          fi
          # Directly load Docker image to Kind cluster
          echo "Loading Docker image into Kind cluster..."
          kind load docker-image "$DOCKER_IMAGE_NAME":latest --name production-stack


      - name: Run Helm tests with matrix strategy
        env:
          DOCKER_BUILDKIT: 1
        run: |
          set -e

          TEST_SCENARIOS=(
            ".github/router.yaml routerSpec"
          )

          for SCENARIO in "${TEST_SCENARIOS[@]}"; do
            VALUES_FILE="$(echo "$SCENARIO" | cut -d' ' -f1)"
            echo "🚀 Deploying scenario with values file: ${VALUES_FILE}"
            helm uninstall vllm || true
            helm lint ./helm || {
              echo "❌ Helm lint failed"
              exit 1
            }
            helm install vllm ./helm -f "$VALUES_FILE" --debug || {
              echo "❌ Helm install failed"
              kubectl get pods -A
              kubectl describe pod -l environment=router,release=router --namespace=default
              kubectl get events --sort-by='.lastTimestamp'
              exit 1
            }

            echo "⏳ Waiting for pods to be ready..."
            RETRIES=5
            LOG_DIR="output-logs"
            mkdir -p "$LOG_DIR"

            for i in $(seq 1 "${RETRIES}"); do
              if kubectl wait --for=condition=ready pod -l environment=router,release=router --namespace=default --timeout=60s; then
                echo "✅ Pods are ready after ${i} attempt(s)"
                kubectl describe pods -n default -l environment=router,release=router
                break
              else
                echo "🚨 Attempt ${i}/${RETRIES}: Pods failed to become ready"
                kubectl get pods -A -o wide
                kubectl describe pod -l environment=router,release=router --namespace=default
                kubectl get events --sort-by='.lastTimestamp'
                kubectl logs -l environment=router,release=router --namespace=default --all-containers=true
                if [ "${i}" -eq "${RETRIES}" ]; then
                  echo "❌ Pods did not become ready after ${RETRIES} attempts."
                  kubectl logs -l environment=router,release=router --namespace=default --all-containers=true
                  exit 1
                fi
                echo "🔄 Retrying in 10 seconds..."
                sleep 10
              fi
            done
          done

      - name: Validate the installation and send query to the stack
        run: |
          bash .github/port-forward.sh curl-pod
        timeout-minutes: 5
      - name: Archive functionality results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output-single-pod
          path: |
            output-single-pod/

      - name: Archive test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: helm-test-results
          path: |
            output-logs/**

      - name: Cleanup Kind cluster
        run: |
          helm uninstall vllm || true
          kind delete clusters kind || true
        if: always()
