suite: test per-model tolerations configuration
templates:
  - deployment-vllm-multi.yaml
tests:
  - it: should apply global tolerations when no per-model tolerations are set
    set:
      servingEngineSpec:
        enableEngine: true
        tolerations:
          - key: "gpu-node"
            operator: "Exists"
            effect: "NoSchedule"
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: "gpu-node"
              operator: "Exists"
              effect: "NoSchedule"

  - it: should not set tolerations when neither global nor per-model tolerations are set
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
    asserts:
      - notExists:
          path: spec.template.spec.tolerations

  - it: should append per-model tolerations to global tolerations by default
    set:
      servingEngineSpec:
        enableEngine: true
        tolerations:
          - key: "gpu-node"
            operator: "Exists"
            effect: "NoSchedule"
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            tolerations:
              - key: "dedicated"
                operator: "Equal"
                value: "test-model"
                effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: "gpu-node"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "dedicated"
              operator: "Equal"
              value: "test-model"
              effect: "NoSchedule"

  - it: should append per-model tolerations to global tolerations when policy is append
    set:
      servingEngineSpec:
        enableEngine: true
        tolerations:
          - key: "gpu-node"
            operator: "Exists"
            effect: "NoSchedule"
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            tolerations:
              - key: "dedicated"
                operator: "Equal"
                value: "test-model"
                effect: "NoSchedule"
            tolerationsPolicy: "append"
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: "gpu-node"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "dedicated"
              operator: "Equal"
              value: "test-model"
              effect: "NoSchedule"

  - it: should override global tolerations when policy is override
    set:
      servingEngineSpec:
        enableEngine: true
        tolerations:
          - key: "gpu-node"
            operator: "Exists"
            effect: "NoSchedule"
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            tolerations:
              - key: "dedicated"
                operator: "Equal"
                value: "test-model"
                effect: "NoSchedule"
            tolerationsPolicy: "override"
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: "dedicated"
              operator: "Equal"
              value: "test-model"
              effect: "NoSchedule"

  - it: should use only per-model tolerations when there are no global tolerations and policy is append
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            tolerations:
              - key: "dedicated"
                operator: "Equal"
                value: "test-model"
                effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations
          value:
            - key: "dedicated"
              operator: "Equal"
              value: "test-model"
              effect: "NoSchedule"

  - it: should apply different tolerations per model
    set:
      servingEngineSpec:
        enableEngine: true
        tolerations:
          - key: "gpu-node"
            operator: "Exists"
            effect: "NoSchedule"
        modelSpec:
          - name: "model-a"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            tolerations:
              - key: "dedicated"
                operator: "Equal"
                value: "model-a"
                effect: "NoSchedule"
            tolerationsPolicy: "override"
          - name: "model-b"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
    asserts:
      - documentIndex: 0
        equal:
          path: spec.template.spec.tolerations
          value:
            - key: "dedicated"
              operator: "Equal"
              value: "model-a"
              effect: "NoSchedule"
      - documentIndex: 1
        equal:
          path: spec.template.spec.tolerations
          value:
            - key: "gpu-node"
              operator: "Exists"
              effect: "NoSchedule"
