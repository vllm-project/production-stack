suite: test Shared Storage configuration
templates:
  - shared-storage.yaml
tests:
  - it: should not render anything when shared storage is disabled
    set:
      sharedPvcStorage:
        enabled: false
    asserts:
    - hasDocuments:
        count: 0

  - it: should render PersistentVolume and PersistentVolumeClaim when shared storage is enabled with hostPath
    release:
      name: vllm
    set:
      sharedPvcStorage:
        enabled: true
        hostPath: /data/shared
        size: 50Gi
        accessModes:
          - ReadWriteMany
    asserts:
    - hasDocuments:
        count: 2
    - documentIndex: 0
      equal:
        path: kind
        value: PersistentVolume
    - documentIndex: 0
      equal:
        path: metadata.name
        value: vllm-shared-pvc-storage
    - documentIndex: 0
      notExists:
        path: spec.storageClassName
    - documentIndex: 0
      equal:
        path: spec
        value:
          capacity:
            storage: 50Gi
          accessModes:
            - ReadWriteMany
          hostPath:
            path: /data/shared
    - documentIndex: 0
      notExists:
        path: spec.nfs
    - documentIndex: 1
      equal:
        path: kind
        value: PersistentVolumeClaim
    - documentIndex: 1
      notExists:
        path: spec.storageClassName
    - documentIndex: 1
      equal:
        path: spec
        value:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 50Gi
          volumeName: vllm-shared-pvc-storage

  - it: should render PersistentVolume and PersistentVolumeClaim when shared storage is enabled with NFS
    release:
      name: vllm
    set:
      sharedPvcStorage:
        enabled: true
        nfs:
          server: nfs-server.example.com
          path: /exports/shared
        size: 50Gi
        accessModes:
          - ReadWriteMany
    asserts:
    - hasDocuments:
        count: 2
    - documentIndex: 0
      equal:
        path: kind
        value: PersistentVolume
    - documentIndex: 0
      equal:
        path: metadata.name
        value: vllm-shared-pvc-storage
    - documentIndex: 0
      notExists:
        path: spec.storageClassName
    - documentIndex: 0
      equal:
        path: spec
        value:
          capacity:
            storage: 50Gi
          accessModes:
            - ReadWriteMany
          nfs:
            server: nfs-server.example.com
            path: /exports/shared
    - documentIndex: 0
      notExists:
        path: spec.hostPath
    - documentIndex: 1
      equal:
        path: kind
        value: PersistentVolumeClaim
    - documentIndex: 1
      notExists:
        path: spec.storageClassName
    - documentIndex: 1
      equal:
        path: spec
        value:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 50Gi
          volumeName: vllm-shared-pvc-storage

  - it: should only render a PersistentVolumeClaim when using a CSI driver that dynamically provisions volumes (default storageClass)
    release:
      name: vllm
    set:
      sharedPvcStorage:
        enabled: true
        size: 50Gi
        accessModes:
          - ReadWriteMany
    asserts:
    - hasDocuments:
        count: 1
    - documentIndex: 0
      equal:
        path: kind
        value: PersistentVolumeClaim
    - documentIndex: 0
      notExists:
        path: spec.storageClassName
    - documentIndex: 0
      equal:
        path: spec
        value:
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 50Gi

  - it: should only render a PersistentVolumeClaim when using a CSI driver that dynamically provisions volumes
    release:
      name: vllm
    set:
      sharedPvcStorage:
        enabled: true
        storageClass: "custom-csi-driver"
        size: 50Gi
        accessModes:
          - ReadWriteMany
    asserts:
    - hasDocuments:
        count: 1
    - documentIndex: 0
      equal:
        path: kind
        value: PersistentVolumeClaim
    - documentIndex: 0
      equal:
        path: spec
        value:
          storageClassName: custom-csi-driver
          accessModes:
            - ReadWriteMany
          resources:
            requests:
              storage: 50Gi
