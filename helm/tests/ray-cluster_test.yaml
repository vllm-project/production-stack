suite: test RayCluster configuration
templates:
  - ray-cluster.yaml
tests:
  - it: should not render anything when RayCluster is disabled
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
    asserts:
    - hasDocuments:
        count: 0

  - it: should not render anything when model is disabled
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        labels:
          custom-label: custom-value
        securityContext:
          runAsNonRoot: true
        modelSpec:
          - name: "test-model"
            enabled: false
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - hasDocuments:
        count: 0

  - it: should render two rayClusters
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        labels:
          custom-label: custom-value
        securityContext:
          runAsNonRoot: true
        modelSpec:
          - name: "test-model"
            enabled: true
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
          - name: "test-model-2"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - hasDocuments:
        count: 6

  - it: should render a custom RayCluster when enabled
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        labels:
          custom-label: custom-value
        securityContext:
          runAsNonRoot: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      equal:
        path: metadata.labels
        value:
          model: test-model
          helm-release-name: vllm
          custom-label: custom-value
          environment: test
          release: test
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.metadata.labels
        value:
          model: test-model
          helm-release-name: vllm
          custom-label: custom-value
          environment: test
          release: test
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.securityContext
        value:
          runAsNonRoot: true
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.containers[0].image
        value: "vllm/vllm-openai:latest"

    - documentIndex: 0
      equal:
        path: spec.workerGroupSpecs[0].template.metadata.labels
        value:
          model: test-model
          helm-release-name: vllm
          custom-label: custom-value
          environment: test
          release: test
    - documentIndex: 0
      equal:
        path: spec.workerGroupSpecs[0].template.spec.securityContext
        value:
          runAsNonRoot: true
    - documentIndex: 0
      equal:
        path: spec.workerGroupSpecs[0].template.spec.containers[0].image
        value: "vllm/vllm-openai:latest"

  - it: should render annotations and podAnnotations on the RayCluster
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            annotations:
              example.com/owner: team-a
            podAnnotations:
              k8s.v1.cni.cncf.io/networks: macvlan-conf
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      equal:
        path: metadata.annotations.["example.com/owner"]
        value: team-a
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.metadata.annotations.["k8s.v1.cni.cncf.io/networks"]
        value: macvlan-conf
    - documentIndex: 0
      equal:
        path: spec.workerGroupSpecs[0].template.metadata.annotations.["k8s.v1.cni.cncf.io/networks"]
        value: macvlan-conf

  - it: should not render VLLM_API_KEY
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      notContains:
        path: spec.headGroupSpec.template.spec.containers[0].env
        content:
          name: VLLM_API_KEY
        any: true
    - documentIndex: 0
      notContains:
        path: spec.workerGroupSpecs[0].template.spec.containers[0].env
        content:
          name: VLLM_API_KEY
        any: true

  - it: should not render VLLM_API_KEY when empty string
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        vllmApiKey: ""
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      notContains:
        path: spec.headGroupSpec.template.spec.containers[0].env
        content:
          name: VLLM_API_KEY
        any: true
    - documentIndex: 0
      notContains:
        path: spec.workerGroupSpecs[0].template.spec.containers[0].env
        content:
          name: VLLM_API_KEY
        any: true

  - it: should render vllmApiKey from default secret
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        vllmApiKey: "test"
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      contains:
        path: spec.headGroupSpec.template.spec.containers[0].env
        content:
          name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-secrets
              key: vllmApiKey
    - documentIndex: 0
      contains:
        path: spec.workerGroupSpecs[0].template.spec.containers[0].env
        content:
          name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-secrets
              key: vllmApiKey

  - it: should render vllmApiKey from referenced secret
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        vllmApiKey:
          secretName: custom-secret
          secretKey: custom-key
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      contains:
        path: spec.headGroupSpec.template.spec.containers[0].env
        content:
          name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: custom-secret
              key: custom-key
    - documentIndex: 0
      contains:
        path: spec.workerGroupSpecs[0].template.spec.containers[0].env
        content:
          name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: custom-secret
              key: custom-key

  - it: should render LMCACHE env vars
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        vllmApiKey: ""
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
            lmcacheConfig:
              enabled: true
            vllmConfig:
              v1: 1
      cacheserverSpec:
        enabled: true
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      contains:
        path: spec.headGroupSpec.template.spec.containers[0].env
        content:
          name: LMCACHE_REMOTE_URL
          value: lm://vllm-cache-server-service:80
        any: true
    - documentIndex: 0
      contains:
        path: spec.headGroupSpec.template.spec.containers[0].env
        content:
          name: LMCACHE_USE_EXPERIMENTAL
          value: "True"
        any: true
    - documentIndex: 0
      contains:
        path: spec.headGroupSpec.template.spec.containers[0].env
        content:
          name: LMCACHE_LOG_LEVEL
          value: INFO
        any: true
    - documentIndex: 0
      notContains:
        path: spec.workerGroupSpecs[0].template.spec.containers[0].env
        content:
          name: LMCACHE_REMOTE_SERDE
        any: true

  - it: should render LMCACHE_REMOTE_SERDE env var
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        vllmApiKey: ""
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            imagePullSecret: "model-secret"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
            lmcacheConfig:
              enabled: true
            vllmConfig:
              v1: 1
      cacheserverSpec:
        enabled: true
        serde: naive
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      contains:
        path: spec.headGroupSpec.template.spec.containers[0].env
        content:
          name: LMCACHE_REMOTE_SERDE
          value: naive
        any: true

  - it: should set serviceAccountName on head and worker when specified
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            serviceAccountName: "my-custom-sa"
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.serviceAccountName
        value: my-custom-sa
    - documentIndex: 0
      equal:
        path: spec.workerGroupSpecs[0].template.spec.serviceAccountName
        value: my-custom-sa

  - it: should not set serviceAccountName when not specified
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      isNull:
        path: spec.headGroupSpec.template.spec.serviceAccountName
    - documentIndex: 0
      isNull:
        path: spec.workerGroupSpecs[0].template.spec.serviceAccountName

  - it: should not set serviceAccountName when set to empty string
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            serviceAccountName: ""
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      isNull:
        path: spec.headGroupSpec.template.spec.serviceAccountName
    - documentIndex: 0
      isNull:
        path: spec.workerGroupSpecs[0].template.spec.serviceAccountName

  - it: should pass --revision flag in the start script when modelRevision is set
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
            modelRevision: "abc123def"
    asserts:
    - documentSelector:
        path: metadata.name
        value: "test-model-vllm-start-script"
      matchRegex:
        path: data["vllm-entrypoint.sh"]
        pattern: "--revision.*abc123def"

  - it: should not pass --revision flag in the start script when modelRevision is empty
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
            modelRevision: ""
    asserts:
    - documentSelector:
        path: metadata.name
        value: "test-model-vllm-start-script"
      notMatchRegex:
        path: data["vllm-entrypoint.sh"]
        pattern: "--revision"

  - it: should not render initContainers on head or worker when not configured
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      isNull:
        path: spec.headGroupSpec.template.spec.initContainers
    - documentIndex: 0
      isNull:
        path: spec.workerGroupSpecs[0].template.spec.initContainers

  - it: should render initContainer on head node from raySpec.headNode.initContainer
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
                initContainer:
                  name: "head-init"
                  image: "busybox:latest"
                  command: ["sh", "-c"]
                  args: ["echo head-init"]
                  env:
                    - name: HEAD_VAR
                      value: "head-value"
                  resources:
                    requests:
                      cpu: "50m"
                      memory: "64Mi"
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.initContainers[0].name
        value: head-init
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.initContainers[0].image
        value: busybox:latest
    - documentIndex: 0
      contains:
        path: spec.headGroupSpec.template.spec.initContainers[0].env
        content:
          name: RELEASE_NAME
          value: vllm
        any: true
    - documentIndex: 0
      contains:
        path: spec.headGroupSpec.template.spec.initContainers[0].env
        content:
          name: HEAD_VAR
          value: "head-value"
        any: true
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.initContainers[0].resources.requests.cpu
        value: "50m"
    - documentIndex: 0
      isNull:
        path: spec.workerGroupSpecs[0].template.spec.initContainers

  - it: should render initContainer on worker nodes from modelSpec.initContainer
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 2
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            initContainer:
              name: "worker-init"
              image: "busybox:latest"
              command: ["sh", "-c"]
              args: ["echo worker-init"]
              env:
                - name: WORKER_VAR
                  value: "worker-value"
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
    asserts:
    - documentIndex: 0
      equal:
        path: kind
        value: RayCluster
    - documentIndex: 0
      isNull:
        path: spec.headGroupSpec.template.spec.initContainers
    - documentIndex: 0
      equal:
        path: spec.workerGroupSpecs[0].template.spec.initContainers[0].name
        value: worker-init
    - documentIndex: 0
      equal:
        path: spec.workerGroupSpecs[0].template.spec.initContainers[0].image
        value: busybox:latest
    - documentIndex: 0
      contains:
        path: spec.workerGroupSpecs[0].template.spec.initContainers[0].env
        content:
          name: RELEASE_NAME
          value: vllm
        any: true
    - documentIndex: 0
      contains:
        path: spec.workerGroupSpecs[0].template.spec.initContainers[0].env
        content:
          name: WORKER_VAR
          value: "worker-value"
        any: true
    - documentIndex: 0
      equal:
        path: spec.workerGroupSpecs[0].template.spec.initContainers[0].resources.requests.memory
        value: "128Mi"

  - it: should render independent initContainers on head and worker when both are configured
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 1
            initContainer:
              name: "worker-init"
              image: "busybox:latest"
              command: ["sh", "-c"]
              args: ["echo worker"]
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 1
                initContainer:
                  name: "head-init"
                  image: "busybox:latest"
                  command: ["sh", "-c"]
                  args: ["echo head"]
    asserts:
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.initContainers[0].name
        value: head-init
    - documentIndex: 0
      equal:
        path: spec.workerGroupSpecs[0].template.spec.initContainers[0].name
        value: worker-init

  - it: should honor raySpec.headNode.resources override on the head container
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
            modelURL: "facebook/opt-125m"
            replicaCount: 1
            requestCPU: 1
            requestMemory: "1Gi"
            requestGPU: 0
            raySpec:
              enabled: true
              headNode:
                requestCPU: 1
                requestMemory: "1Gi"
                requestGPU: 0
                resources:
                  requests:
                    cpu: "3"
                    memory: "12Gi"
                    nvidia.com/gpu: "1"
                  limits:
                    cpu: "6"
                    memory: "24Gi"
                    nvidia.com/gpu: "1"
    asserts:
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.containers[0].resources.requests.cpu
        value: "3"
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.containers[0].resources.requests.memory
        value: "12Gi"
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.containers[0].resources.requests["nvidia.com/gpu"]
        value: "1"
    - documentIndex: 0
      equal:
        path: spec.headGroupSpec.template.spec.containers[0].resources.limits.cpu
        value: "6"

  - it: should honor modelSpec.resources override on the worker container
    release:
      name: vllm
    set:
      servingEngineSpec:
        enableEngine: true
        modelSpec:
          - name: "test-model"
            repository: "vllm/vllm-openai"
            tag: "latest"
