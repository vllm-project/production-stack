suite: test ServiceAccount creation
templates:
  - serviceaccount.yaml
tests:
  # Router ServiceAccount tests
  - it: should create router ServiceAccount when serviceAccountName is not set
    release:
      name: vllm
    set:
      routerSpec:
        enableRouter: true
        serviceAccountName: ""
      loraController:
        enableLoraController: false
    asserts:
    - containsDocument:
        kind: ServiceAccount
        apiVersion: v1
        name: vllm-router-service-account

  - it: should NOT create router ServiceAccount when serviceAccountName is specified
    release:
      name: vllm
    set:
      routerSpec:
        enableRouter: true
        serviceAccountName: my-existing-sa
      loraController:
        enableLoraController: false
    asserts:
    - hasDocuments:
        count: 0

  - it: should NOT create router ServiceAccount when router is disabled
    set:
      routerSpec:
        enableRouter: false
      loraController:
        enableLoraController: false
    asserts:
    - hasDocuments:
        count: 0

  # Lora Controller ServiceAccount tests
  - it: should create lora-controller ServiceAccount when serviceAccountName is not set
    release:
      name: vllm
    set:
      routerSpec:
        enableRouter: false
      loraController:
        enableLoraController: true
        serviceAccountName: ""
    asserts:
    - containsDocument:
        kind: ServiceAccount
        apiVersion: v1
        name: vllm-lora-controller

  - it: should NOT create lora-controller ServiceAccount when serviceAccountName is specified
    release:
      name: vllm
    set:
      routerSpec:
        enableRouter: false
      loraController:
        enableLoraController: true
        serviceAccountName: my-existing-lora-sa
    asserts:
    - hasDocuments:
        count: 0

  - it: should create both ServiceAccounts when both are enabled and no custom names set
    release:
      name: vllm
    set:
      routerSpec:
        enableRouter: true
        serviceAccountName: ""
      loraController:
        enableLoraController: true
        serviceAccountName: ""
    asserts:
    - hasDocuments:
        count: 2

  - it: should create only lora-controller ServiceAccount when router uses custom name
    release:
      name: vllm
    set:
      routerSpec:
        enableRouter: true
        serviceAccountName: my-existing-router-sa
      loraController:
        enableLoraController: true
        serviceAccountName: ""
    asserts:
    - hasDocuments:
        count: 1
    - containsDocument:
        kind: ServiceAccount
        apiVersion: v1
        name: vllm-lora-controller

  - it: should create only router ServiceAccount when lora-controller uses custom name
    release:
      name: vllm
    set:
      routerSpec:
        enableRouter: true
        serviceAccountName: ""
      loraController:
        enableLoraController: true
        serviceAccountName: my-existing-lora-sa
    asserts:
    - hasDocuments:
        count: 1
    - containsDocument:
        kind: ServiceAccount
        apiVersion: v1
        name: vllm-router-service-account
