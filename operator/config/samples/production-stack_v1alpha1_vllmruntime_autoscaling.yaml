# Example: Minimal autoscaling config (all defaults)
apiVersion: production-stack.vllm.ai/v1alpha1
kind: VLLMRuntime
metadata:
  labels:
    app.kubernetes.io/name: production-stack
    app.kubernetes.io/managed-by: kustomize
  name: vllmruntime-autoscaling-minimal
spec:
  model:
    modelURL: "meta-llama/Llama-3.1-8B-Instruct"

  vllmConfig:
    v1: true
    port: 8000

  deploymentConfig:
    replicas: 1
    resources:
      gpu: "1"
    image:
      registry: "docker.io"
      name: "lmcache/vllm-openai:latest"

  autoscalingConfig:
    enabled: true
    maxReplicas: 2

---
# Example: Scale-to-zero enabled
apiVersion: production-stack.vllm.ai/v1alpha1
kind: VLLMRuntime
metadata:
  labels:
    app.kubernetes.io/name: production-stack
    app.kubernetes.io/managed-by: kustomize
  name: vllmruntime-autoscaling-scale-to-zero
spec:
  model:
    modelURL: "meta-llama/Llama-3.1-8B-Instruct"

  vllmConfig:
    v1: true
    port: 8000

  deploymentConfig:
    replicas: 1
    resources:
      gpu: "1"
    image:
      registry: "docker.io"
      name: "lmcache/vllm-openai:latest"

  autoscalingConfig:
    enabled: true
    minReplicas: 0          # enable scale-to-zero
    maxReplicas: 2
    scaleDownPolicy:
      scaleToZeroDelaySeconds: 600  # scale to zero after 10 min idle

---
# Example: VLLMRuntime with autoscaling enabled
# This example shows all autoscaling options with their default values.
# Most fields are optional — only `enabled: true` and `maxReplicas` are required.
apiVersion: production-stack.vllm.ai/v1alpha1
kind: VLLMRuntime
metadata:
  labels:
    app.kubernetes.io/name: production-stack
    app.kubernetes.io/managed-by: kustomize
  name: vllmruntime-autoscaling-sample
spec:
  model:
    modelURL: "meta-llama/Llama-3.1-8B-Instruct"
    maxModelLen: 4096
    dtype: "bfloat16"
    maxNumSeqs: 32

  vllmConfig:
    enableChunkedPrefill: true
    enablePrefixCaching: true
    tensorParallelSize: 1
    gpuMemoryUtilization: "0.9"
    v1: true
    port: 8000

  deploymentConfig:
    replicas: 1
    deploymentStrategy: "Recreate"
    resources:
      cpu: "8"
      memory: "32Gi"
      gpu: "1"
      gpuType: "nvidia.com/gpu"
    image:
      registry: "docker.io"
      name: "lmcache/vllm-openai:latest"
      pullPolicy: "IfNotPresent"

  # Autoscaling configuration (KEDA)
  # The operator creates a ScaledObject that targets this VLLMRuntime CR
  # via the scale subresource. KEDA updates CR replicas, the operator
  # reconciles the Deployment — no conflict.
  autoscalingConfig:
    enabled: true

    # Replica bounds
    minReplicas: 1          # default: 1 (set to 0 for scale-to-zero)
    maxReplicas: 4          # required

    # How often KEDA checks metrics (seconds)
    pollingInterval: 15     # default: 15

    # Scale-up behavior
    scaleUpPolicy:
      stabilizationWindowSeconds: 0   # default: 0 (scale up immediately)
      podValue: 1                     # default: 1 (add 1 pod per period)
      periodSeconds: 60               # default: 60

    # Scale-down behavior
    scaleDownPolicy:
      stabilizationWindowSeconds: 300   # default: 300 (wait 5 min before scaling down)
      podValue: 1                       # default: 1 (remove 1 pod per period)
      periodSeconds: 60                 # default: 60
      scaleToZeroDelaySeconds: 1800     # default: 1800 (30 min, only applies when minReplicas=0)

    # Metric thresholds (per-pod, KEDA divides by current replica count)
    triggers:
      prometheusAddress: "http://kube-prom-stack-kube-prome-prometheus.monitoring.svc:9090"
      requestsRunningThreshold: 5       # default: 5 concurrent requests
      generationTokensThreshold: 100    # default: 100 tokens/s
      promptTokensThreshold: 100        # default: 100 tokens/s
